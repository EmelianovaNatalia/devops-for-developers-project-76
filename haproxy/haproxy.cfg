global
    log /dev/log local0
    maxconn 2000

defaults
    log     global
    mode    http
    option  httplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend http_front
    bind *:80
    default_backend app_servers

frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s

backend app_servers
    balance roundrobin
    option httpchk GET /
    server vm1 192.168.56.11:80 check
    server vm2 192.168.56.12:80 check