name: Deploy to VMs

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to VM1
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM1_IP }}
          username: vagrant
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /vagrant/app
            docker compose up -d --build

      - name: Deploy to VM2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM2_IP }}
          username: vagrant
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /vagrant/app
            docker compose up -d --build